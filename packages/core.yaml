# TCL AC core package — minimal template for the package-based workflow.
# For a standalone config (recommended), use external_components directly.

external_components:
  - source:
      url: https://github.com/rozenofu/tclac.git
      type: git
      ref: master
    components: [ tclac ]
    refresh: 30s

esphome:
  name: ${device_name}
  min_version: 2023.3.0
  friendly_name: ${humanly_name}

logger:
  baud_rate: 0

api:
  encryption:
    key: "${api_key}"

ota:
  - platform: esphome
    password: "${ota_pass}"

wifi:
  ssid: ${wifi_ssid}
  password: ${wifi_password}
  ap:
    ssid: "${device_name} Fallback Hotspot"
    password: "${recovery_pass}"

captive_portal:

climate:
  - platform: tclac
    name: "${humanly_name}"
    id: ${device_name}climate
