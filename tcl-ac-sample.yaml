esphome:
  name: tcl-ac
  friendly_name: TCL AC
  min_version: 2026.4.0
  name_add_mac_suffix: false

esp32:
  board: m5stack-atoms3  # adjust for your board
  variant: esp32s3
  framework:
    type: arduino

logger:
  level: INFO
  baud_rate: 0

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

external_components:
  - source:
      url: https://github.com/rozenofu/tclac.git
      type: git
      ref: master
    components: [ tclac ]
    refresh: 30s

uart:
  id: ac_uart
  rx_pin: GPIO7  # adjust for your board
  tx_pin: GPIO8  # adjust for your board
  baud_rate: 9600
  data_bits: 8
  parity: EVEN
  stop_bits: 1

climate:
  - platform: tclac
    name: "TCL AC"
    uart_id: ac_uart

    # Compile-time settings sent to AC on first UART contact
    beeper: false
    show_display: true

    # Remove modes not supported by your unit
    supported_modes:
      - "OFF"
      - AUTO
      - COOL
      - HEAT
      - DRY
      - FAN_ONLY

    # Remove speeds not supported by your unit
    # FOCUS = faster than HIGH, DIFFUSE = turbo
    supported_fan_modes:
      - AUTO
      - QUIET
      - LOW
      - MIDDLE
      - MEDIUM
      - HIGH
      - FOCUS
      - DIFFUSE

    supported_swing_modes:
      - "OFF"
      - VERTICAL
      - HORIZONTAL
      - BOTH
